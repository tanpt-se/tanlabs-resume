<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Phạm Trọng Tận — Resume</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap"
			rel="stylesheet"
		/>
		<style>
			#app-splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #f7f3ea;
				transition: opacity 0.42s ease, visibility 0.42s ease;
			}

			html.dark #app-splash {
				background: #1f1f1f;
			}

			#app-splash.app-splash--out {
				opacity: 0;
				visibility: hidden;
				pointer-events: none;
			}

			.app-splash__mark {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1rem;
				color: #1c1c1c;
				font-family: "Inter", sans-serif;
				animation: app-splash-enter 0.55s ease-out both;
			}

			html.dark .app-splash__mark {
				color: #f2ede4;
			}

			.app-splash__initials {
				font-size: 2rem;
				font-weight: 700;
				letter-spacing: 0.08em;
			}

			.app-splash__ring {
				width: 2.5rem;
				height: 2.5rem;
				border-radius: 999px;
				border: 2px solid color-mix(in srgb, currentColor 18%, transparent);
				border-top-color: currentColor;
				animation: app-splash-spin 0.8s linear infinite;
			}

			@keyframes app-splash-enter {
				from {
					opacity: 0;
					transform: translateY(8px) scale(0.98);
				}

				to {
					opacity: 1;
					transform: translateY(0) scale(1);
				}
			}

			@keyframes app-splash-spin {
				to {
					transform: rotate(360deg);
				}
			}

			body.boot-loading {
				overflow: hidden;
			}

			@media (prefers-reduced-motion: reduce) {
				.app-splash__mark,
				.app-splash__ring {
					animation: none;
				}
			}
		</style>
		<script>
			(function () {
				var theme = localStorage.getItem("resume-theme") || "light";
				var isDark =
					theme === "dark" ||
					(theme === "system" &&
						window.matchMedia("(prefers-color-scheme: dark)").matches);
				document.documentElement.classList.toggle("dark", isDark);

				var locale = localStorage.getItem("resume-locale") || "en";
				document.documentElement.lang = locale;

				document.body.classList.add("boot-loading");
			})();
		</script>
	</head>

	<body>
		<div id="app-splash" aria-live="polite" aria-busy="true">
			<div class="app-splash__mark">
				<span class="app-splash__initials">PT</span>
				<span class="app-splash__ring" aria-hidden="true"></span>
			</div>
		</div>
		<div id="root"></div>
		<script type="module" src="/src/react-app/main.tsx"></script>
	</body>
</html>
